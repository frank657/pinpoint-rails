test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Aliyun OSS — used in production (and any env with credentials set). Ported from
# method-channel; see docs/decisions/0007. The block is only parsed when the :aliyun
# service is actually used, so missing credentials never affect dev/test boot.
aliyun:
  service: Aliyun
  access_key_id: <%= Rails.application.credentials.dig(:aliyun, :access_key_id) %>
  access_key_secret: <%= Rails.application.credentials.dig(:aliyun, :access_key_secret) %>
  bucket: <%= Rails.application.credentials.dig(:aliyun, :bucket) %>
  endpoint: <%= Rails.application.credentials.dig(:aliyun, :endpoint) %>
  mode: "private"
  path: <%= Rails.env %>
