# PostgreSQL. Versions 9.5 and up are supported.
#
# Multi-database layout (primary + Solid Queue/Cache/Cable) across all environments —
# see docs/decisions/0007 and docs/ARCHITECTURE.md.
#
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  primary: &primary_development
    <<: *default
    database: pinpoint_rails_development
  cache:
    <<: *primary_development
    database: pinpoint_rails_development_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_development
    database: pinpoint_rails_development_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_development
    database: pinpoint_rails_development_cable
    migrations_paths: db/cable_migrate

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  primary: &primary_test
    <<: *default
    database: pinpoint_rails_test
  cache:
    <<: *primary_test
    database: pinpoint_rails_test_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_test
    database: pinpoint_rails_test_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_test
    database: pinpoint_rails_test_cable
    migrations_paths: db/cable_migrate

# Production overrides via DATABASE_URL where applicable.
production:
  primary: &primary_production
    <<: *default
    database: pinpoint_rails_production
    username: pinpoint_rails
    password: <%= ENV["PINPOINT_RAILS_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: pinpoint_rails_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: pinpoint_rails_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: pinpoint_rails_production_cable
    migrations_paths: db/cable_migrate
